<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Dark Mode Graph · Lab</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="base.css" />

  <style>
    body {
      margin: 0;
      /* Outside-of-frame background so the lab has its own workshop feel */
      background:
        radial-gradient(circle at 20% 20%, #1b1733 0%, transparent 55%),
        radial-gradient(circle at 80% 70%, #140e24 0%, transparent 50%),
        #0a0716;
      color: rgba(247, 236, 225, 0.82);
      font-family: "Inter", system-ui, sans-serif;
    }

    /* Lab chrome */
    .lab-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 14px 22px;
      background: linear-gradient(180deg, rgba(10, 7, 22, 0.92), rgba(10, 7, 22, 0.0));
      pointer-events: none;
    }
    .lab-header h1 {
      margin: 0; font-family: "Geom", serif; font-weight: 600;
      font-size: 18px; letter-spacing: 0.01em;
      color: #f7ece1;
    }
    .lab-header p {
      margin: 2px 0 0; font-size: 12px;
      color: rgba(247, 236, 225, 0.55);
      letter-spacing: 0.01em;
    }

    /* Artboard baseline — each variation renders inside this */
    .art {
      position: relative;
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1.85fr) minmax(320px, 1fr);
      gap: 16px;
      padding: 16px;
      box-sizing: border-box;
      font-family: "Inter", system-ui, sans-serif;
    }
    .art-stage, .art-panel {
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }

    /* Shared panel + stage typography */
    .kicker {
      font-family: "Geom", serif;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(141, 134, 201, 0.78);
    }
    .title {
      margin: 8px 0 0;
      font-family: "Geom", serif;
      font-weight: 600;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.005em;
      color: #f7ece1;
    }
    .copy {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.55;
      color: rgba(247, 236, 225, 0.64);
      max-width: 38ch;
      text-wrap: pretty;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 999px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .btn {
      margin-top: 14px; padding: 10px 16px;
      border-radius: 10px;
      font-family: "Geom", serif;
      font-weight: 600; font-size: 13px;
      letter-spacing: 0.01em;
      border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ghost {
      background: transparent;
      color: rgba(247, 236, 225, 0.7);
      border: 1px solid rgba(247, 236, 225, 0.14);
      padding: 8px 14px; font-size: 12px;
    }
    .divider {
      height: 1px; margin: 18px 0;
      background: linear-gradient(90deg, transparent, rgba(141, 134, 201, 0.22), transparent);
    }

    /* Stage chrome (header strip inside the stage) */
    .stage-header {
      position: absolute; top: 16px; left: 18px; right: 18px;
      display: flex; justify-content: space-between; align-items: start;
      pointer-events: none;
      z-index: 3;
    }
    .stage-header .kicker { color: rgba(141, 134, 201, 0.62); }
    .stage-header .title  { font-size: 19px; margin-top: 4px; }

    /* Legend — used by some variations */
    .legend {
      position: absolute; bottom: 16px; left: 18px;
      display: flex; gap: 14px;
      font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(247, 236, 225, 0.55);
      z-index: 3;
      pointer-events: none;
    }
    .legend-dot {
      display: inline-flex; align-items: center; gap: 6px;
    }
    .legend-dot::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }

    /* Each variation overrides the stage's svg + card chrome.
       Nodes are rendered as SVG so we can style crystals, halos,
       gradients, etc. natively. */

    /* ----------------------------------------------------------
       VARIATION 1 — NIGHT ATLAS
       Conservative, in-brand. Deep indigo, crisp state colors,
       subtle grid, readable spine.
       ---------------------------------------------------------- */
    .v1 .art-stage {
      background:
        radial-gradient(circle at 50% 38%, rgba(144, 103, 198, 0.16), transparent 55%),
        radial-gradient(circle at 18% 12%, rgba(141, 134, 201, 0.10), transparent 45%),
        linear-gradient(180deg, #1a1530 0%, #120d22 100%);
      border: 1px solid rgba(141, 134, 201, 0.14);
    }
    .v1 .art-stage::before {
      /* subtle grid paper */
      content: "";
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(141, 134, 201, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(141, 134, 201, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 50% 45%, #000 0%, transparent 82%);
      pointer-events: none;
    }
    .v1 .art-panel {
      background: linear-gradient(180deg, #1e1936, #16112a);
      border: 1px solid rgba(141, 134, 201, 0.16);
      padding: 22px;
    }
    .v1 .btn-primary {
      background: #7a59aa;
      color: #f7ece1;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
    }
    .v1 .pill-locked   { background: rgba(141, 134, 201, 0.14); color: rgba(141, 134, 201, 0.9); }
    .v1 .pill-primed   { background: rgba(107, 180, 216, 0.16); color: #a9d4ea; }
    .v1 .pill-drilled  { background: rgba(217, 161, 74, 0.16); color: #e5be78; }
    .v1 .pill-solid    { background: rgba(77, 186, 138, 0.18); color: #8fe3b5; }

    /* ----------------------------------------------------------
       VARIATION 2 — OBSIDIAN CATHEDRAL
       Moody, cinematic. Near-black, single violet spotlight on
       active node, gold "illuminated manuscript" accents for
       solidified nodes. Crystal facets visible.
       ---------------------------------------------------------- */
    .v2 .art-stage {
      background:
        radial-gradient(ellipse 40% 40% at 46% 50%, rgba(144, 103, 198, 0.28), transparent 65%),
        radial-gradient(circle at 50% 100%, rgba(60, 50, 100, 0.22), transparent 55%),
        linear-gradient(180deg, #0a0712 0%, #06040c 100%);
      border: 1px solid rgba(144, 103, 198, 0.18);
    }
    .v2 .art-stage::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(247, 236, 225, 0.04), transparent 18%),
        radial-gradient(circle at 82% 78%, rgba(247, 236, 225, 0.03), transparent 20%);
      pointer-events: none;
    }
    .v2 .art-panel {
      background:
        linear-gradient(180deg, #120c24 0%, #0a0716 100%);
      border: 1px solid rgba(144, 103, 198, 0.22);
      padding: 24px;
      position: relative;
    }
    .v2 .art-panel::before {
      /* seam of light on the panel edge that "connects" to the active node */
      content: "";
      position: absolute;
      left: -1px; top: 38%; width: 2px; height: 24%;
      background: linear-gradient(180deg, transparent, #b99bf0, transparent);
      box-shadow: 0 0 18px 2px rgba(185, 155, 240, 0.6);
    }
    .v2 .btn-primary {
      background: linear-gradient(180deg, #9067c6, #7a59aa);
      color: #f7ece1;
      border: 1px solid rgba(247, 236, 225, 0.14);
      box-shadow: 0 0 24px rgba(144, 103, 198, 0.35);
    }
    .v2 .pill-locked   { background: rgba(181, 168, 220, 0.08); color: rgba(181, 168, 220, 0.7); border: 1px solid rgba(181, 168, 220, 0.14); }
    .v2 .pill-primed   { background: rgba(109, 176, 213, 0.12); color: #bedfee; border: 1px solid rgba(109, 176, 213, 0.22); }
    .v2 .pill-drilled  { background: rgba(217, 161, 74, 0.14); color: #ecc78a; border: 1px solid rgba(217, 161, 74, 0.24); }
    .v2 .pill-solid    { background: rgba(218, 177, 82, 0.16); color: #f0d383; border: 1px solid rgba(218, 177, 82, 0.28); }

    /* ----------------------------------------------------------
       VARIATION 3 — CONSTELLATION
       Bold, novel. Starfield background, luminous nodes with
       halos, animated edge beams on the active path.
       ---------------------------------------------------------- */
    .v3 .art-stage {
      background:
        radial-gradient(ellipse 50% 50% at 50% 40%, rgba(144, 103, 198, 0.22), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(30, 22, 58, 0.4), transparent 50%),
        linear-gradient(180deg, #07050f 0%, #0c0820 50%, #05030a 100%);
      border: 1px solid rgba(141, 134, 201, 0.2);
    }
    .v3 .art-panel {
      /* Darker, more premium — matches V2's obsidian feel */
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(144, 103, 198, 0.14), transparent 70%),
        linear-gradient(180deg, #120c24 0%, #07050f 100%);
      border: 1px solid rgba(144, 103, 198, 0.26);
      padding: 24px;
      position: relative;
      backdrop-filter: none;
      box-shadow:
        inset 0 1px 0 rgba(247, 236, 225, 0.04),
        0 18px 48px rgba(0, 0, 0, 0.45);
    }
    .v3 .art-panel::before {
      /* Seam of light on the panel edge — links it to the active node */
      content: "";
      position: absolute;
      left: -1px; top: 34%; width: 2px; height: 28%;
      background: linear-gradient(180deg, transparent, #d7beff, transparent);
      box-shadow: 0 0 20px 3px rgba(215, 190, 255, 0.7);
      z-index: 2;
    }
    .v3 .art-panel::after {
      /* Subtle ambient bloom in the upper area, anchoring the title */
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 120px;
      background: radial-gradient(ellipse at 30% 0%, rgba(215, 190, 255, 0.08), transparent 70%);
      pointer-events: none;
    }
    .v3 .btn-primary {
      background: linear-gradient(180deg, #a788d8 0%, #8560c0 100%);
      color: #120c24;
      box-shadow:
        0 2px 0 rgba(0, 0, 0, 0.4),
        0 0 32px rgba(167, 136, 216, 0.5);
      font-weight: 700;
    }
    .v3 .pill-locked   { background: rgba(141, 134, 201, 0.12); color: rgba(181, 168, 220, 0.82); }
    .v3 .pill-primed   { background: rgba(109, 176, 213, 0.18); color: #bde1ef; }
    .v3 .pill-drilled  { background: rgba(229, 175, 92, 0.18); color: #f4cf86; }
    .v3 .pill-solid    {
      background: linear-gradient(90deg, rgba(144, 103, 198, 0.3), rgba(167, 136, 216, 0.3));
      color: #e9d7ff;
    }

    /* Starfield for v3 — pure CSS twinkling */
    .v3-stars {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .v3-stars span {
      position: absolute;
      width: 2px; height: 2px; border-radius: 50%;
      background: #f7ece1;
      opacity: 0.4;
      animation: twinkle 3.6s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.18; transform: scale(0.8); }
      50%      { opacity: 0.85; transform: scale(1.2); }
    }

    /* Active node halo pulse — used in v1 & v3 */
    @keyframes halo-pulse {
      0%, 100% { opacity: 0.6; r: 28; }
      50%      { opacity: 0.95; r: 34; }
    }
    /* Edge beam travel — used in v3 */
    @keyframes beam-travel {
      0%   { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -200; }
    }

    /* svg node label */
    .node-label {
      font-family: "Geom", serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .edge-label {
      font-family: "Inter", sans-serif;
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Legend dot hues per variation */
    .v1 .dot-locked::before  { background: rgba(141, 134, 201, 0.5); }
    .v1 .dot-primed::before  { background: #7cb7db; }
    .v1 .dot-drilled::before { background: #d9a14a; }
    .v1 .dot-solid::before   { background: #4dba8a; box-shadow: 0 0 8px #4dba8a; }

    .v2 .dot-locked::before  { background: rgba(181, 168, 220, 0.4); }
    .v2 .dot-primed::before  { background: #8ac2e2; }
    .v2 .dot-drilled::before { background: #e0a860; }
    .v2 .dot-solid::before   { background: #eac575; box-shadow: 0 0 8px rgba(234, 197, 117, 0.7); }

    .v3 .dot-locked::before  { background: rgba(181, 168, 220, 0.4); }
    .v3 .dot-primed::before  { background: #9fd5ed; box-shadow: 0 0 6px rgba(159, 213, 237, 0.7); }
    .v3 .dot-drilled::before { background: #f0c373; box-shadow: 0 0 6px rgba(240, 195, 115, 0.7); }
    .v3 .dot-solid::before   { background: #d7beff; box-shadow: 0 0 12px rgba(215, 190, 255, 0.9); }

    /* Ensure SVGs fill their containers */
    .graph-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="lab-header">
    <h1>Dark Mode · Graph View</h1>
    <p>Three directions for the knowledge-graph dark theme. Drag artboards, use arrows to focus one.</p>
  </div>

  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="graph-data.jsx"></script>
  <script type="text/babel" src="graph-artboards.jsx"></script>
  <script type="text/babel" src="lab-root.jsx"></script>
</body>
</html>
