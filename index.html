<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Theta</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>




<!-- Backdrop (mobile only) -->
<div id="backdrop" onclick="App.closeDrawer()"></div>

<!-- Left sidebar -->
<div id="drawer" data-open="false">
  <div class="sidebar-brand">
    <span class="sidebar-brand-name">tink</span>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-nav-item active" href="#">Dashboard</a>
    <a class="sidebar-nav-item" href="#">Library</a>
    <a class="sidebar-nav-item" href="#">Analytics</a>
    <a class="sidebar-nav-item" href="#" onclick="startSettings()">Settings</a>
  </nav>

  <div class="sidebar-divider"></div>
  <span class="sidebar-section-label">Concepts</span>

  <div id="concept-list"></div>
  <div id="add-trigger-area"></div>

  <!-- Close button (mobile only) -->
  <button class="drawer-close" onclick="App.closeDrawer()">×</button>
</div>

<!-- Main content -->
<div id="card">

  <!-- Header bar (desktop) -->
  <header class="main-header">
    <div class="main-header-left">
      <button class="drawer-toggle" onclick="App.toggleDrawer()" title="Menu">☰</button>
      <span class="main-header-title">Clarity Dashboard</span>
    </div>
    <button class="dev-skip" id="dev-btn" style="display:none;" onclick="App.fastForward()">[skip 24h]</button>
  </header>

  <!-- Hero card: concept info left, crystal grid right -->
  <section class="hero-card">

    <div class="hero-info">
      <div class="concept-label" id="concept-label"></div>
      <h2 id="title">tink</h2>
      <p class="desc" id="desc">Add a tink to begin your growth.</p>
      <div id="timer-display">24:00:00</div>

      <div class="controls" id="primary-controls" style="display:none;">
        <button id="btn-extract" onclick="App.extract()">1. Extract</button>
        <button id="btn-drill"   onclick="App.drill()" disabled>3. Drill (Recall)</button>
      </div>
      <div class="controls row" id="drill-controls" style="display:none;">
        <button class="btn-fail" onclick="App.drillFail()">Simulate Fail</button>
        <button class="btn-pass" onclick="App.drillPass()">Simulate Pass</button>
      </div>
      <div class="controls" id="consolidate-controls" style="display:none; margin-top:10px;">
        <button id="btn-consolidate" onclick="App.consolidate()">4. Consolidate</button>
      </div>
    </div>

    <!-- 2×2 isometric crystal grid -->
    <div id="grid-container" style="position:relative; padding-top:28px; overflow:visible;">
      <svg id="grid-svg" viewBox="0 0 280 220" width="280" height="220"
           xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
        <defs>
          <filter id="glow-filter" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>
        <!-- Paint order: back → front. Transforms are fixed. Content populated by renderGrid(). -->
        <g id="tile-0" class="tile-group" transform="translate(70,45)"  onclick="App.selectTile(0)"></g>
        <g id="tile-1" class="tile-group" transform="translate(0,85)"   onclick="App.selectTile(1)"></g>
        <g id="tile-2" class="tile-group" transform="translate(140,85)" onclick="App.selectTile(2)"></g>
        <g id="tile-3" class="tile-group" transform="translate(70,125)" onclick="App.selectTile(3)"></g>
      </svg>
      <div id="tile-tooltip"></div>
    </div>

  </section>

</div>

<script src="app.js"></script>
<script src="graph.js"></script>

<!-- Cross-Page Router -->
<a id="mode-toggle" href="stitch/code.html" style="text-decoration:none; display:inline-flex; align-items:center; gap:6px; position:fixed; bottom:24px; right:24px; z-index:2000; background:var(--primary); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:10px 18px; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:800; color:white; box-shadow:0 6px 16px rgba(124,111,205,0.4); transition:all 0.3s cubic-bezier(0.2,0.8,0.2,1);" onmouseover="this.style.transform='translateY(-2px) scale(1.02)'; this.style.boxShadow='0 8px 24px rgba(124,111,205,0.6)'; this.style.color='white';" onmouseout="this.style.transform='none'; this.style.boxShadow='0 6px 16px rgba(124,111,205,0.4)';">
  Ops Mode 
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
</a>
</body>
</html>
