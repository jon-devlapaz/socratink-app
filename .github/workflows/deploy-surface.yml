name: deploy-surface

on:
  pull_request:
  push:
    branches:
      - main
      - dev-fresh

jobs:
  vercel-requirements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate Vercel requirements
        run: python scripts/check-vercel-requirements.py
