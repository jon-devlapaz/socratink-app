# Repository-level Codex configuration

sandbox_mode = "workspace-write"
approval_policy = "on-request"
[project]
name = "socratink"
default_agent = "orchestrator"

[paths]
bootstrap = "docs/codex/onboarding.md"
project_state = "docs/project/state.md"


[agents.orchestrator]
config_file = ".agents/codex/orchestrator.toml"

[agents.theta]
config_file = ".agents/codex/theta.toml"

[agents.sherlock]
config_file = ".agents/codex/sherlock.toml"

[agents.elliot]
config_file = ".agents/codex/elliot.toml"

[agents.rob]
config_file = ".agents/codex/rob.toml"

[agents.thurman]
config_file = ".agents/codex/thurman.toml"

[agents.glenna]
config_file = ".agents/codex/glenna.toml"

[skills]
directory = ".agents/skills"

[sandbox_workspace_write]
network_access = true
