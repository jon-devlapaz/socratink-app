# Repository-level Codex configuration

sandbox_mode = "workspace-write"
approval_policy = "on-request"
[project]
name = "LearnOps-tamagachi"
default_agent = "orchestrator"

# These repo-root paths are mirrored under `.codex/` so both repo-root and
# config-file-relative resolvers can find the same bootstrap docs.
[paths]
bootstrap = "docs/codex/session-bootstrap.md"
project_state = "docs/project/state.md"


[agents.orchestrator]
config_file = "agents/orchestrator.toml"

[agents.theta]
config_file = "agents/theta.toml"

[agents.sherlock]
config_file = "agents/sherlock.toml"

[agents.elliot]
config_file = "agents/elliot.toml"

[agents.rob]
config_file = "agents/rob.toml"

[agents.thurman]
config_file = "agents/thurman.toml"

[agents.glenna]
config_file = "agents/glenna.toml"

# The skill directory is likewise mirrored under `.codex/.agents/skills`.
[skills]
directory = ".agents/skills"

[sandbox_workspace_write]
network_access = true
