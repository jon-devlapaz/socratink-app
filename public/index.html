<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&icon_names=auto_awesome,memory,psychology&display=block"
    rel="stylesheet">
  <title>socratink</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png?v=5">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=5">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=5">
  <link rel="shortcut icon" href="/favicon-32x32.png?v=5">
  <link rel="stylesheet" href="styles.css?v=11">
</head>

<body>
  <script>
    try {
      if (localStorage.getItem('learnops-theme') === 'dark') {
        document.documentElement.dataset.theme = 'dark';
        document.body.classList.add('night');
        document.body.dataset.theme = 'dark';
      }
    } catch (err) {
      console.warn('Theme preload skipped.', err);
    }
  </script>


  <!-- Backdrop (mobile only) -->
  <div id="backdrop" onclick="App.closeDrawer()"></div>

  <!-- Left sidebar -->
  <div id="drawer" data-open="false">
    <div class="sidebar-brand">
      <span class="sidebar-brand-name">socratink</span>
    </div>

    <nav class="sidebar-nav">
      <a id="nav-dashboard" class="sidebar-nav-item active" href="javascript:void(0)"
        onclick="App.showDashboard()">Dashboard</a>
      <a id="nav-library" class="sidebar-nav-item" href="javascript:void(0)" onclick="App.showLibrary()">Library</a>
      <a id="nav-analytics" class="sidebar-nav-item" href="javascript:void(0)"
        onclick="App.showAnalytics()" title="Open learner analytics">Analytics</a>
      <a id="nav-settings" class="sidebar-nav-item" href="javascript:void(0)" onclick="startSettings()">Settings</a>
      <a id="nav-guide" class="sidebar-nav-item" href="javascript:void(0)" onclick="App.toggleTutorial()">[?] Quick Guide</a>
    </nav>

    <div class="sidebar-divider"></div>
    <span class="sidebar-section-label">Concepts</span>

    <div id="concept-list"></div>
    <div id="add-trigger-area"></div>

    <!-- Close button (mobile only) -->
    <button class="drawer-close" onclick="App.closeDrawer()">×</button>
  </div>

  <!-- Main content -->
  <div id="card">

    <!-- Header bar (desktop) -->
    <header class="main-header">
      <div class="main-header-left">
        <button class="drawer-toggle" id="drawer-toggle" onclick="App.toggleDrawer()" aria-label="Toggle sidebar"
          aria-expanded="false" aria-controls="drawer">
          <svg class="toggle-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <g class="icon-menu">
              <line x1="3" y1="4.5" x2="15" y2="4.5" />
              <line x1="3" y1="9" x2="15" y2="9" />
              <line x1="3" y1="13.5" x2="15" y2="13.5" />
            </g>
            <g class="icon-collapse">
              <polyline points="10,4 4.5,9 10,14" />
            </g>
          </svg>
        </button>
      </div>
      <div class="main-header-right">
        <button class="theme-toggle" id="theme-toggle" type="button" onclick="App.toggleTheme()"
          aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
          <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4.5"></circle>
              <path d="M12 2.5v3"></path>
              <path d="M12 18.5v3"></path>
              <path d="M4.9 4.9l2.1 2.1"></path>
              <path d="M17 17l2.1 2.1"></path>
              <path d="M2.5 12h3"></path>
              <path d="M18.5 12h3"></path>
              <path d="M4.9 19.1L7 17"></path>
              <path d="M17 7l2.1-2.1"></path>
            </svg>
          </span>
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.5 15.2A8.8 8.8 0 1 1 12.8 3.5a7.2 7.2 0 0 0 7.7 11.7z"></path>
              <path d="M18 5.2v2.1"></path>
              <path d="M16.95 6.25h2.1"></path>
            </svg>
          </span>
        </button>
        <button class="dev-skip" id="dev-btn" style="display:none;" onclick="App.fastForward()">[skip 24h]</button>
      </div>
    </header>

    <!-- Hero card: concept info left, crystal grid right -->
    <section class="hero-card">

      <div class="hero-info" id="hero-info">
        <div class="hero-meta-row">
          <div class="concept-label" id="concept-label">Dashboard</div>
          <div class="hero-state-chip" id="hero-state-chip" data-state="empty">Board Empty</div>
        </div>
        <h1 class="hero-title" id="title">Add your first socratink</h1>
        <p class="desc hero-guidance" id="desc">Create a concept to start building your board.</p>
        <div class="hero-actions">
          <button id="hero-primary-action" class="hero-primary-action" type="button" onclick="App.runHeroAction()">
            Add Concept
          </button>
        </div>
        <div id="timer-display">24:00:00</div>

        <!-- Action Controls (Hidden for Board-First UX) -->
        <div id="primary-controls" style="display:none; gap: 8px; margin-top: 16px;">
          <button id="btn-drill" onclick="App.drill()">3. Drill (Recall)</button>
        </div>
        <div id="drill-controls" style="display:none; gap: 8px; margin-top: 16px;">
          <button onclick="App.drillFail()">Forgot</button>
          <button onclick="App.drillPass()">Remembered</button>
        </div>
        <div id="consolidate-controls" style="display:none; gap: 8px; margin-top: 16px;">
          <button onclick="App.consolidate()" disabled title="Consolidation is coming soon">Consolidate (Coming Soon)</button>
        </div>
      </div>

      <!-- 2×2 isometric crystal grid -->
      <div id="grid-container" style="position:relative; padding-top:28px; overflow:visible;">
        <!-- Floating Consolidate Button (appears dynamically after successful drill) -->
        <button id="btn-consolidate-float" class="btn-consolidate-float" onclick="App.consolidate()"
          style="display:none;" disabled title="Consolidation is coming soon" aria-label="Consolidation coming soon">
          <svg
            style="display: block; width: 16px; height: 16px; flex-shrink: 0; stroke: #ffffff; fill: none; pointer-events: none;"
            viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <svg id="grid-svg" viewBox="0 0 280 220" width="280" height="220" xmlns="http://www.w3.org/2000/svg"
          style="overflow:visible;">
          <defs>
            <filter id="glow-filter" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <!-- Paint order: back → front. Transforms are fixed. Content populated by renderGrid(). -->
          <g id="tile-0" class="tile-group" transform="translate(70,45)" onclick="App.selectTile(0)"></g>
          <g id="tile-1" class="tile-group" transform="translate(0,85)" onclick="App.selectTile(1)"></g>
          <g id="tile-2" class="tile-group" transform="translate(140,85)" onclick="App.selectTile(2)"></g>
          <g id="tile-3" class="tile-group" transform="translate(70,125)" onclick="App.selectTile(3)"></g>
        </svg>
        <div id="tile-tooltip"></div>
      </div>

    </section>

    <!-- Library View Panel -->
    <section id="library-view" class="library-view">
      <div id="library-content"></div>
    </section>

    <!-- Map View Panel -->
    <section id="map-view" class="map-view">
      <button class="map-close-btn" onclick="App.hideMapView()" aria-label="Close map">×</button>
      <div class="map-view-shell">
        <div class="map-mode-switch" role="tablist" aria-label="Map display mode">
          <button id="map-mode-study" class="map-mode-btn active" data-map-mode="study" type="button">Study
            View</button>
          <button id="map-mode-graph" class="map-mode-btn" data-map-mode="graph" type="button">Graph View</button>
        </div>
        <div id="map-content"></div>
        <div id="graph-content" class="graph-content" hidden>
          <div class="graph-layout">
            <div class="graph-stage-wrap">
              <div class="graph-stage-header">
                <div>
                  <div class="graph-stage-kicker">Architecture</div>
                  <h3 class="graph-stage-title">Knowledge Graph</h3>
                </div>
              </div>
              <div id="graph-stage" class="graph-stage"></div>
            </div>
            <aside id="graph-detail" class="graph-detail">
              <div id="graph-node-detail" class="graph-node-detail"></div>
              <div class="drill-ui drill-ui-embedded" id="drill-ui">
                <div class="drill-header">
                  <button class="drill-back" onclick="App.cancelDrill()">← Back</button>
                  <span class="drill-title" id="drill-title">Socratic Drill</span>
                </div>
                <div class="chat-history" id="chat-history"></div>
                <div class="chat-input-area">
                  <textarea class="chat-input" id="chat-input" placeholder="Explain this concept in your own words..."
                    rows="2"></textarea>
                </div>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- PDF.js for robust client-side extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>

  <script src="js/ai_service.js"></script>
  <script type="module" src="js/app.js?v=16"></script>

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>

</html>
